  This is ONE self-contained file. No installation, no server.
  - Double-click it to open in a browser and try it.
  - Later, drop it into a GitHub repo to publish it for students.

  HOW IT'S ORGANIZED (for editing later):
  - All the math/questions live in the QUESTIONS array near the bottom of the

    edit the numbers inside its gen() function — look for "EDIT NUMBERS HERE".

<body>
<div class="wrap">

  <p class="kicker">ECO 3101 · Math Review</p>
  <header>
    <span class="mark" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <path d="M5 29V5M5 29h24" stroke="#2b5c8a" stroke-width="2" stroke-linecap="round"/>
        <path d="M6 24C12 24 13 9 28 8" stroke="#17263a" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </span>
    <h1>Lecture 2 Exercises</h1>
  </header>
  <p class="sub">Intermediate Microeconomic Theory. Fresh numbers every time — work it out, type your answer, check yourself.</p>

  <div class="topics" id="topics" role="group" aria-label="Choose a problem type"></div>

  <div class="card" id="card">
    <div class="eyebrow"><span id="eyebrow">—</span></div>
    <div class="prompt" id="prompt"></div>
    <div class="answers" id="answers"></div>
    <div class="actions">
      <button class="btn btn-primary" id="check">Check answer</button>
      <button class="btn btn-ghost" id="next">New question</button>
      <button class="btn-text" id="steps">Show steps</button>
      <span class="spacer"></span>
      <span class="score" id="score">Solved 0</span>
    </div>
    <div class="feedback" id="feedback" aria-live="polite"></div>
    <div class="solution" id="solution"></div>
  </div>

  <footer>Ungraded self-practice. Nothing is recorded — refresh for a clean slate.</footer>
</div>

<script>
/* ===========================================================================
   1) SMALL HELPERS
   =========================================================================== */
const $ = (id) => document.getElementById(id);
const randInt = (lo, hi) => lo + Math.floor(Math.random() * (hi - lo + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const comma = (n) => n.toLocaleString('en-US');

// kill floating-point noise like 0.30000000000000004
const round6 = (x) => Math.round(x * 1e6) / 1e6;
// format a number cleanly for display (0.3, 1.5, -0.2, 6 ...)
const nf = (x) => { const r = round6(x); return Number.isInteger(r) ? String(r) : String(parseFloat(r.toFixed(4))); };

// Build a polynomial as LaTeX from terms [{c: coefficient, t: 'x^{2}' | 'Q' | ''}].
// Handles signs, coefficients of 1, and zero terms.
function poly(terms){
  let s = '';
  terms.forEach(term => {
    const c = round6(term.c);
    if (c === 0) return;
    const neg = c < 0, mag = Math.abs(c);
    const coef = (mag === 1 && term.t !== '') ? '' : nf(mag);  // hide "1" before a variable
    if (s === '') s += (neg ? '-' : '') + coef + term.t;
    else s += (neg ? ' - ' : ' + ') + coef + term.t;
  });
  return s === '' ? '0' : s;
}

// Turn what a student typed into a number. Accepts "10,000", " $500 ", "4.0", "-0.2", unicode minus.
function parseNum(raw){
  if (raw == null) return null;
  const cleaned = String(raw).replace(/\u2212/g, '-').replace(/[\s,$]/g, '');
  if (cleaned === '') return null;
  const v = Number(cleaned);
  return Number.isFinite(v) ? v : null;
}

/* ===========================================================================
   2) THE QUESTIONS  (order here = order of the topic buttons)
   Each gen() returns: { promptHTML, parts:[{label,unit,answer,tol}], solutionHTML }
   Edit pools marked "EDIT NUMBERS HERE".
   =========================================================================== */
const QUESTIONS = [

  /* ----- Price ceiling / excess demand (bridge from Lecture 1) ----------- */
  {
    key: 'ceiling',
    name: 'Price ceiling',
    eyebrow: 'Market intervention',
    gen(){
      // EDIT NUMBERS HERE
      const d  = pick([20, 25, 50]);                 // demand slope is 1/d
      const Qs = pick([10000, 12000, 15000, 20000]); // fixed supply (all divisible by d)
      const Peq = pick([400, 500, 600, 800]);        // equilibrium (market) price
      const dropChoices = { 20:[250,400,500], 25:[200,300,400], 50:[100,150,200,250] }[d];
      let drop;
      do { drop = pick(dropChoices); } while (Peq - drop < 100);

      const a  = Peq + Qs / d;
      const Pc = Peq - drop;
      const excess = drop * d;
      const Qd = (a - Pc) * d;

      const promptHTML = `
        <p>The demand for FSU football season tickets is
           \\( P = ${comma(a)} - \\frac{1}{${d}}\\,Q \\),
           and supply is fixed at \\( Q = ${comma(Qs)} \\).</p>
        <p>Tallahassee bans ticket scalping, setting a face-value price ceiling of
           <strong>$${comma(Pc)}</strong>. How many fans are left dissatisfied —
           i.e., how large is excess demand at that price?</p>
        <p class="hint">Hint: plug \\(P=${comma(Pc)}\\) into demand to get quantity
           demanded, then subtract supply (\\(${comma(Qs)}\\)).</p>`;

      const solutionHTML = `
        <h4>Worked solution</h4>
        <p>Set \\(P=${comma(Pc)}\\): &nbsp; \\(${comma(Pc)} = ${comma(a)} - \\frac{1}{${d}}Q\\).</p>
        <p>Solve: \\(Q_d = (${comma(a)}-${comma(Pc)})\\times ${d} = ${comma(Qd)}\\).</p>
        <p>Excess demand \\(= Q_d - Q_s = ${comma(Qd)} - ${comma(Qs)} = \\mathbf{${comma(excess)}}\\).</p>`;

      return { promptHTML, parts:[{ label:'Excess demand', unit:'fans', answer:excess, tol:0.5 }], solutionHTML };
    }
  },

  /* ----- Slope between two points (rise over run) ------------------------ */
  {
    key: 'avgslope',
    name: 'Slope between two points',
    eyebrow: 'Slope — rise over run',
    gen(){
      // EDIT NUMBERS HERE
      const a = pick([1, 2, 3]);
      const b = pick([-2, -1, 0, 1, 2, 3, 5]);
      const c = pick([0, 2, 5, 10]);
      const x1 = pick([0, 1, 2, 3]);
      const x2 = pick([4, 5, 6, 7]);
      const f = (x) => a*x*x + b*x + c;
      const slope = a*(x1 + x2) + b;

      const promptHTML = `
        <p>Consider \\( f(x) = ${poly([{c:a,t:'x^{2}'},{c:b,t:'x'},{c:c,t:''}])} \\).</p>
        <p>What is the <strong>average slope</strong> of \\(f\\) between
           \\(x_1 = ${x1}\\) and \\(x_2 = ${x2}\\)?</p>
        <p class="hint">Hint: average slope \\(= \\dfrac{f(x_2) - f(x_1)}{x_2 - x_1}\\).</p>`;

      const solutionHTML = `
        <h4>Worked solution</h4>
        <p>\\(f(${x1}) = ${f(x1)}\\) and \\(f(${x2}) = ${f(x2)}\\).</p>
        <p>Slope \\(= \\dfrac{${f(x2)} - (${f(x1)})}{${x2} - ${x1}}
           = \\dfrac{${f(x2) - f(x1)}}{${x2 - x1}} = \\mathbf{${slope}}\\).</p>`;

      return { promptHTML, parts:[{ label:'Average slope', unit:'', answer:slope, tol:0.001 }], solutionHTML };
    }
  },

  /* ----- Derivative at a point (power rule) ------------------------------ */
  {
    key: 'deriv',
    name: 'Derivative at a point',
    eyebrow: 'Derivative — power rule',
    gen(){
      // EDIT NUMBERS HERE
      const k  = pick([1, 2, 3, 4, 5]);
      const x0 = pick([1, 2, 3, 4, 5]);
      const slope = 2 * k * x0;

      const fn = (k === 1) ? `x^{2}` : `${k}x^{2}`;
      const promptHTML = `
        <p>Consider \\( y = ${fn} \\). What is the slope of this function at
           \\( x = ${x0} \\)?</p>
        <p class="hint">Hint: differentiate (\\(\\frac{d}{dx}ax^{n}=a\\,n\\,x^{n-1}\\)), then plug in \\(x=${x0}\\).</p>`;

      const solutionHTML = `
        <h4>Worked solution</h4>
        <p>\\(\\dfrac{dy}{dx} = ${2*k}x\\).</p>
        <p>At \\(x=${x0}\\): slope \\(= ${2*k}\\times ${x0} = \\mathbf{${slope}}\\).</p>`;

      return { promptHTML, parts:[{ label:'Slope at the given point', unit:'', answer:slope, tol:0.001 }], solutionHTML };
    }
  },

  /* ----- Polynomial derivative (sum + power rules) -----------------------
     e.g. y = 0.5x^3 + 0.1x^2 - 9.  Students enter dy/dx by its coefficients. */
  {
    key: 'polyderiv',
    name: 'Polynomial derivative',
    eyebrow: 'Derivative — sum rule',
    gen(){
      // EDIT NUMBERS HERE
      const a = pick([0.1, 0.2, 0.5, 1, 2, 3]);        // coefficient on x^3
      const b = pick([-1, -0.5, 0.1, 0.5, 1, 2, 3]);   // coefficient on x^2
      const c = pick([-9, -3.6, -2, 5, 10]);           // constant (differentiates to 0)
      const dA = round6(3 * a);                         // -> coefficient on x^2 in dy/dx
      const dB = round6(2 * b);                         // -> coefficient on x  in dy/dx

      const yFn  = poly([{c:a,t:'x^{3}'}, {c:b,t:'x^{2}'}, {c:c,t:''}]);
      const dyFn = poly([{c:dA,t:'x^{2}'}, {c:dB,t:'x'}]);

      const promptHTML = `
        <p>Differentiate \\( y = ${yFn} \\).</p>
        <p>Enter the two coefficients of \\(\\dfrac{dy}{dx}\\) below.</p>
        <p class="hint">Hint: apply \\(\\frac{d}{dx}ax^{n}=a\\,n\\,x^{n-1}\\) term by term;
           the constant differentiates to 0.</p>`;

      const solutionHTML = `
        <h4>Worked solution</h4>
        <p>\\(\\frac{d}{dx}(${nf(a)}x^{3}) = ${nf(dA)}x^{2}\\), &nbsp;
           \\(\\frac{d}{dx}(${nf(b)}x^{2}) = ${nf(dB)}x\\), &nbsp;
           \\(\\frac{d}{dx}(${nf(c)}) = 0\\).</p>
        <p>\\(\\dfrac{dy}{dx} = ${dyFn}\\).</p>`;

      return {
        promptHTML,
        parts: [
          { label:'Coefficient on \\(x^{2}\\)', unit:'', answer:dA, tol:0.01 },
          { label:'Coefficient on \\(x\\)',     unit:'', answer:dB, tol:0.01 }
        ],
        solutionHTML
      };
    }
  },

  /* ----- Marginal profit (derivative of an economic function) ------------
     e.g. pi = 2Q - 0.1Q^2 - 3.6.  Find d(pi)/dQ by its coefficients. */
  {
    key: 'marginal',
    name: 'Marginal profit',
    eyebrow: 'Marginal value',
    gen(){
      // EDIT NUMBERS HERE
      const a  = pick([2, 3, 4, 5, 10, 1.5]);          // coefficient on Q
      const b  = pick([0.05, 0.1, 0.25, 0.5, 1, 2]);   // coefficient on Q^2
      const cc = pick([3.6, 5, 10, 2.5, 12]);          // fixed cost (differentiates to 0)
      const dConst = a;                                 // constant term of d(pi)/dQ
      const dQ = round6(-2 * b);                        // coefficient on Q (negative)

      const piFn  = poly([{c:a,t:'Q'}, {c:-b,t:'Q^{2}'}, {c:-cc,t:''}]);
      const dpiFn = poly([{c:dConst,t:''}, {c:dQ,t:'Q'}]);

      const promptHTML = `
        <p>A firm's profit as a function of output \\(Q\\) is
           $$\\pi = ${piFn}.$$</p>
        <p>Find marginal profit \\(\\dfrac{d\\pi}{dQ}\\) and enter its two coefficients below.</p>
        <p class="hint">Hint: differentiate with respect to \\(Q\\) term by term; the fixed
           cost is constant, so it differentiates to 0.</p>`;

      const solutionHTML = `
        <h4>Worked solution</h4>
        <p>\\(\\frac{d}{dQ}(${nf(a)}Q) = ${nf(a)}\\), &nbsp;
           \\(\\frac{d}{dQ}(-${nf(b)}Q^{2}) = ${nf(dQ)}Q\\), &nbsp;
           \\(\\frac{d}{dQ}(-${nf(cc)}) = 0\\).</p>
        <p>\\(\\dfrac{d\\pi}{dQ} = ${dpiFn}\\).</p>`;

      return {
        promptHTML,
        parts: [
          { label:'Constant term of \\(\\frac{d\\pi}{dQ}\\)', unit:'', answer:dConst, tol:0.01 },
          { label:'Coefficient on \\(Q\\)',                   unit:'', answer:dQ,     tol:0.01 }
        ],
        solutionHTML
      };
    }
  },

  /* ----- Profit maximization (unconstrained max) ------------------------- */
  {
    key: 'profit',
    name: 'Profit maximization',
    eyebrow: 'Unconstrained maximization',
    gen(){
      // EDIT NUMBERS HERE
      const b  = pick([2, 4, 5, 10]);
      const q  = pick([50, 80, 100, 120, 150]);
      const a  = 2 * b * q;
      const piStar = b * q * q;

      const promptHTML = `
        <p>A firm's profit as a function of output \\(q\\) is
           $$\\pi(q) = ${comma(a)}\\,q - ${b}\\,q^{2}.$$</p>
        <p>Find (1) the profit-maximizing quantity, and (2) the resulting maximum profit.</p>
        <p class="hint">Hint: solve \\(\\pi'(q)=0\\) for \\(q\\), then plug it back into \\(\\pi(q)\\).</p>`;

      const solutionHTML = `
        <h4>Worked solution</h4>
        <p>\\(\\pi'(q) = ${comma(a)} - ${2*b}\\,q = 0 \\;\\Rightarrow\\; q^{*} = \\dfrac{${comma(a)}}{${2*b}} = \\mathbf{${comma(q)}}\\).</p>
        <p>\\(\\pi(${comma(q)}) = ${comma(a)}\\times ${comma(q)} - ${b}\\times ${comma(q)}^{2} = \\mathbf{${comma(piStar)}}\\).</p>`;

      return {
        promptHTML,
        parts: [
          { label:'Profit-maximizing quantity  \\(q^{*}\\)', unit:'units', answer:q,      tol:0.5 },
          { label:'Maximum profit  \\(\\pi(q^{*})\\)',        unit:'$',     answer:piStar, tol:0.5 }
        ],
        solutionHTML
      };
    }
  }

];

/* ===========================================================================
   3) THE ENGINE  (you shouldn't need to touch this to add questions)
   =========================================================================== */
let current = QUESTIONS[0];
let problem = null;
let solvedCount = 0;

const topicsEl = $('topics');
QUESTIONS.forEach((q, i) => {
  const b = document.createElement('button');
  b.className = 'topic';
  b.textContent = q.name;
  b.setAttribute('aria-pressed', i === 0 ? 'true' : 'false');
  b.addEventListener('click', () => {
    current = q;
    [...topicsEl.children].forEach(c => c.setAttribute('aria-pressed', 'false'));
    b.setAttribute('aria-pressed', 'true');
    newProblem();
  });
  topicsEl.appendChild(b);
});

function typeset(){ if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise(); }

function newProblem(){
  problem = current.gen();
  $('eyebrow').textContent = current.eyebrow;
  $('prompt').innerHTML = problem.promptHTML;

  const wrap = $('answers');
  wrap.innerHTML = '';
  problem.parts.forEach((part, idx) => {
    const aria = part.label.replace(/\\\(|\\\)|\\frac|\\pi|[\^{}*]/g, '').trim();
    const field = document.createElement('div');
    field.className = 'field';
    field.innerHTML = `
      <label>${part.label}</label>
      <div class="inputrow">
        <input type="text" inputmode="text" autocomplete="off" data-idx="${idx}" aria-label="${aria}">
        ${part.unit ? `<span class="unit">${part.unit}</span>` : ''}
      </div>`;
    wrap.appendChild(field);
  });

  $('feedback').className = 'feedback';
  $('feedback').textContent = '';
  $('solution').className = 'solution';
  $('solution').innerHTML = problem.solutionHTML;

  typeset();
  const first = wrap.querySelector('input');
  if (first) first.focus();
}

function checkAnswers(){
  const inputs = [...$('answers').querySelectorAll('input')];
  let allCorrect = true, anyBlank = false;

  inputs.forEach(inp => {
    const idx = +inp.dataset.idx;
    const part = problem.parts[idx];
    const val = parseNum(inp.value);
    const field = inp.closest('.field');
    field.classList.remove('ok', 'no');
    if (val === null){ anyBlank = true; allCorrect = false; return; }
    if (Math.abs(val - part.answer) <= (part.tol ?? 0.01)) field.classList.add('ok');
    else { field.classList.add('no'); allCorrect = false; }
  });

  const fb = $('feedback');
  fb.className = 'feedback show';
  if (anyBlank){
    fb.classList.add('bad'); fb.textContent = 'Enter a number in each blank.';
  } else if (allCorrect){
    fb.classList.add('good');
    fb.textContent = problem.parts.length > 1 ? '\u2713 All correct — nice work.' : '\u2713 Correct.';
    solvedCount++; $('score').textContent = 'Solved ' + solvedCount;
  } else {
    fb.classList.add('bad');
    fb.textContent = 'Not quite — fix the highlighted blank and try again, or peek at the steps.';
  }
}

function showSteps(){ $('solution').classList.add('show'); typeset(); }

$('check').addEventListener('click', checkAnswers);
$('next').addEventListener('click', newProblem);
$('steps').addEventListener('click', showSteps);
$('answers').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAnswers(); });

/* ---- Startup: MathJax pageReady calls boot(); 3s fallback if offline ---- */
let booted = false;
function boot(){ if (booted) return; booted = true; newProblem(); }
setTimeout(() => { if (!booted) boot(); }, 3000);
</script>
</body>
</html>
